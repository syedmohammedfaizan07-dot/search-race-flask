<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Race</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="hero">
        <h1><span class="accent-cyan">Search</span> Race 🏁</h1>
        <p class="tagline">
            Compare algorithms using real execution time and step counts.
        </p>
    </div>

    <div class="card controls">

        <div class="modes">
            <button class="mode active" data-mode="search">
                🔍 Linear vs Binary
            </button>

            <button class="mode" data-mode="sort">
                🔀 Bubble vs Merge
            </button>

            <button class="mode" data-mode="membership">
                📦 List vs Set
            </button>
        </div>

        <div class="row">
            <label>
                Dataset Size
                <input type="number" id="size" value="10000">
            </label>

            <button id="run" class="run-btn">
                ▶ START RACE
            </button>
        </div>

    </div>

    <div class="lanes">

        <div class="card lane" id="laneA">

            <div class="lane-head">

                <div>
                    <h3 id="nameA" class="racer-a">
                        Linear Search
                    </h3>

                    <div id="cxA" class="complexity">
                        O(n)
                    </div>
                </div>

                <div class="metrics">
                    <div class="time" id="timeA">
                        — <span>ms</span>
                    </div>

                    <div class="steps" id="stepsA">
                        0 steps
                    </div>
                </div>

            </div>

            <div class="track">
                <div class="fill fill-a" id="fillA"></div>
                <div class="dot dot-a" id="dotA"></div>
                <div class="finish"></div>
            </div>

        </div>

        <div class="card lane" id="laneB">

            <div class="lane-head">

                <div>
                    <h3 id="nameB" class="racer-b">
                        Binary Search
                    </h3>

                    <div id="cxB" class="complexity">
                        O(log n)
                    </div>
                </div>

                <div class="metrics">
                    <div class="time" id="timeB">
                        — <span>ms</span>
                    </div>

                    <div class="steps" id="stepsB">
                        0 steps
                    </div>
                </div>

            </div>

            <div class="track">
                <div class="fill fill-b" id="fillB"></div>
                <div class="dot dot-b" id="dotB"></div>
                <div class="finish"></div>
            </div>

        </div>

    </div>

    <div class="card analysis" id="analysis" hidden>
        <h4>Race Analysis</h4>
        <p id="analysisText"></p>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
